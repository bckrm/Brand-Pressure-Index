  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Brand Pressure Index — Backroom<\u002Ftitle>\n\n<style>\n  /* ======================= FONTS ======================= */\n  @font-face{font-family:\"Tiempos Headline\";font-style:normal;font-weight:300;src:url(\"9f5a056a-04d8-47ba-8f5a-ba2917b5189c\") format(\"opentype\");font-display:swap;}\n  @font-face{font-family:\"Tiempos Headline\";font-style:italic;font-weight:300;src:url(\"2d017ab2-fe60-480f-a947-be66e0bcfa35\") format(\"opentype\");font-display:swap;}\n  @font-face{font-family:\"Tiempos Headline\";font-style:normal;font-weight:400;src:url(\"9b9e48ef-df37-4fab-b481-3c4e80cbed55\") format(\"opentype\");font-display:swap;}\n  @font-face{font-family:\"Tiempos Headline\";font-style:italic;font-weight:400;src:url(\"5950674a-19d6-457c-9a18-ceed82f23de7\") format(\"opentype\");font-display:swap;}\n  @font-face{font-family:\"Tiempos Headline\";font-style:normal;font-weight:500;src:url(\"ac7175d0-1293-4363-b562-a7cf218995f1\") format(\"opentype\");font-display:swap;}\n\n  @font-face{font-family:\"Tiempos Text\";font-style:normal;font-weight:400;src:url(\"29e439be-6401-4259-a020-a237d35de55b\") format(\"opentype\");font-display:swap;}\n  @font-face{font-family:\"Tiempos Text\";font-style:italic;font-weight:400;src:url(\"14710872-737f-45f0-b67f-cb36133495b8\") format(\"opentype\");font-display:swap;}\n  @font-face{font-family:\"Tiempos Text\";font-style:normal;font-weight:500;src:url(\"297bf52c-f843-442a-afd8-fb65ec8bf06e\") format(\"opentype\");font-display:swap;}\n\n  @font-face{font-family:\"Founders Grotesk\";font-style:normal;font-weight:300;src:url(\"1d635ee0-6d62-4463-a93a-59850d852c65\") format(\"opentype\");font-display:swap;}\n  @font-face{font-family:\"Founders Grotesk\";font-style:normal;font-weight:400;src:url(\"ccb4777c-a483-41fb-8158-6cd59aaced4b\") format(\"opentype\");font-display:swap;}\n  @font-face{font-family:\"Founders Grotesk\";font-style:italic;font-weight:400;src:url(\"11f65586-ea95-485e-ade3-2cdc9b6df026\") format(\"opentype\");font-display:swap;}\n  @font-face{font-family:\"Founders Grotesk\";font-style:normal;font-weight:500;src:url(\"d36aae8a-f318-4745-90ac-b2ea23e55e70\") format(\"opentype\");font-display:swap;}\n  @font-face{font-family:\"Founders Grotesk\";font-style:normal;font-weight:600;src:url(\"88866d31-c6f8-492d-b07d-cd0772571cc8\") format(\"opentype\");font-display:swap;}\n  @font-face{font-family:\"Founders Grotesk XCond\";font-style:normal;font-weight:300;src:url(\"95afb53b-5ee5-43c4-85bc-9f2951d57b3f\") format(\"opentype\");font-display:swap;}\n\n  /* ======================= TOKENS ======================= */\n  :root {\n    --bg:         #0c0c0a;\n    --bg-lift:    #141411;\n    --surface:    #17171420;\n    --text:       #ece7d8;\n    --text-dim:   #9b9588;\n    --text-mute:  #6a655b;\n    --text-faint: #3d3a34;\n    --rule:       #2a2a24;\n    --rule-soft:  #1e1e19;\n\n    --accent:      #c4683a;               /* copper */\n    --accent-hot:  #d97843;\n    --accent-soft: rgba(196,104,58,0.28);\n    --accent-wash: rgba(196,104,58,0.06);\n\n    /* Score colors — sacred */\n    --s1: #c44040;  /* Broken */\n    --s2: #d4854a;  /* Exposed */\n    --s3: #c9a96e;  /* Holding */\n    --s4: #5a8a5a;  /* Strong */\n\n    --serif:  \"Tiempos Headline\", \"Times New Roman\", serif;\n    --text-serif: \"Tiempos Text\", Georgia, serif;\n    --sans:   \"Founders Grotesk\", \"Helvetica Neue\", Arial, sans-serif;\n    --xcond:  \"Founders Grotesk XCond\", \"Founders Grotesk\", sans-serif;\n  }\n\n  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }\n  html { scroll-behavior: smooth; }\n  body {\n    background: var(--bg);\n    color: var(--text);\n    font-family: var(--sans);\n    font-weight: 400;\n    font-size: 15.5px;\n    line-height: 1.55;\n    -webkit-font-smoothing: antialiased;\n    text-rendering: optimizeLegibility;\n    min-height: 100vh;\n    overflow-x: hidden;\n  }\n  ::selection { background: var(--accent); color: var(--bg); }\n\n  a { color: inherit; text-decoration: none; }\n  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }\n\n  /* ======================= LAYOUT SHELL ======================= */\n  .shell {\n    max-width: 1240px;\n    margin: 0 auto;\n    padding: 0 56px;\n  }\n\n  /* ======================= NAV ======================= */\n  nav.top {\n    position: sticky;\n    top: 0; z-index: 40;\n    background: rgba(12,12,10,0.88);\n    backdrop-filter: saturate(140%) blur(10px);\n    -webkit-backdrop-filter: saturate(140%) blur(10px);\n    border-bottom: 1px solid var(--rule-soft);\n  }\n  .nav-inner {\n    max-width: 1240px;\n    margin: 0 auto;\n    padding: 18px 56px;\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n  }\n  .wordmark {\n    font-family: var(--serif);\n    font-weight: 400;\n    font-size: 19px;\n    letter-spacing: -0.02em;\n    color: var(--text);\n  }\n  .wordmark em {\n    font-family: var(--text-serif);\n    font-style: italic;\n    font-weight: 400;\n    letter-spacing: -0.04em;\n    color: var(--text-dim);\n    margin-left: 2px;\n  }\n  .nav-links {\n    display: flex;\n    gap: 28px;\n  }\n  .nav-links a {\n    font-family: var(--sans);\n    font-weight: 400;\n    font-size: 13px;\n    color: var(--text-dim);\n    letter-spacing: -0.005em;\n    transition: color .18s ease;\n  }\n  .nav-links a:hover { color: var(--text); }\n  .nav-tag {\n    font-family: var(--sans);\n    font-weight: 500;\n    font-size: 10.5px;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    color: var(--accent);\n    padding: 6px 10px 5px;\n    border: 1px solid var(--accent-soft);\n  }\n\n  /* ======================= TYPE PRIMITIVES ======================= */\n  .eyebrow {\n    font-family: var(--sans);\n    font-weight: 500;\n    font-size: 11px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: var(--accent);\n    display: inline-flex;\n    align-items: center;\n    gap: 12px;\n  }\n  .eyebrow::before {\n    content: '';\n    width: 22px; height: 1px;\n    background: var(--accent);\n  }\n  .eyebrow.plain::before { display: none; }\n\n  .kicker {\n    font-family: var(--sans);\n    font-weight: 500;\n    font-size: 10.5px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--text-mute);\n  }\n\n  .serif {\n    font-family: var(--serif);\n    font-weight: 300;\n    letter-spacing: -0.025em;\n  }\n  .serif em {\n    font-family: var(--text-serif);\n    font-style: italic;\n    font-weight: 400;\n    letter-spacing: -0.04em;\n    color: var(--accent);\n  }\n\n  h1 { font-family: var(--serif); font-weight: 300; letter-spacing: -0.035em; line-height: 0.94; color: var(--text); }\n  h2 { font-family: var(--serif); font-weight: 300; letter-spacing: -0.025em; line-height: 1.02; color: var(--text); }\n  h3 { font-family: var(--serif); font-weight: 400; letter-spacing: -0.02em; line-height: 1.1; color: var(--text); }\n\n  section { padding: 108px 0; }\n  section + section { border-top: 1px solid var(--rule-soft); }\n\n  /* ======================= HERO ======================= */\n  .hero { padding: 88px 0 84px; position: relative; }\n\n  .hero-meta {\n    display: grid;\n    grid-template-columns: auto 1fr auto;\n    gap: 24px;\n    align-items: baseline;\n    padding-bottom: 18px;\n    border-bottom: 1px solid var(--rule);\n    margin-bottom: 48px;\n  }\n  .hero-meta .k { color: var(--text-mute); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 500; }\n  .hero-meta .divider-dot { color: var(--text-faint); }\n\n  .hero-lock {\n    position: relative;\n    padding-bottom: 12px;\n  }\n  .hero-lock h1 {\n    font-size: clamp(64px, 9.2vw, 132px);\n    line-height: 0.92;\n  }\n  .hero-lock .line-2 {\n    font-family: var(--text-serif);\n    font-style: italic;\n    font-weight );\n  }\n  .scale-marker::after {\n    content: '';\n    position: absolute;\n    bottom: -4px; left: -4px;\n    width: 10px; height: 2px;\n    background: var(--text);\n  }\n\n  .scale-ticks {\n    display: flex;\n    justify-content: space-between;\n    margin-top: 10px;\n    font-family: var(--sans);\n    font-weight: 400;\n    font-size: 10px;\n    letter-spacing: 0.1em;\n    color: var(--text-faint);\n  }\n\n  .band-chip {\n    text-align: right;\n  }\n  .band-label {\n    font-family: var(--serif);\n    font-weight: 400;\n    font-size: 22px;\n    letter-spacing: -0.015em;\n    line-height: 1.1;\n    transition: color .3s ease;\n  }\n  .band-sub {\n    font-family: var(--sans);\n    font-weight: 500;\n    font-size: 9.5px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--text-faint);\n    margin-top: 7px;\n  }\n\n  /* Score legend */\n  .score-legend {\n    display: flex;\n    gap: 22px;\n    flex-wrap: wrap;\n    padding: 16px 44px 22px;\n    border-top: 1px solid var(--rule);\n    background: rgba(0,0,0,0.2);\n  }\n  .legend-item {\n    display: flex;\n    align-items: center;\n    gap: 10px;\n    font-family: var(--sans);\n    font-size: 11.5px;\n    color: var(--text-dim);\n    font-weight: 400;\n  }\n  .legend-item .dot {\n    width: 8px; height: 8px;\n    border-radius: 50%;\n    flex-shrink: 0;\n  }\n  .legend-item em {\n    font-family: var(--text-serif);\n    font-style: italic;\n    color: var(--text-mute);\n    margin-left: 4px;\n    font-size: 12px;\n  }\n  .legend-sep {\n    flex: 1 1 0;\n    border-top: 1px dashed var(--rule);\n    align-self: center;\n    min-width: 12px;\n  }\n\n  /* ======================= DIMENSIONS ======================= */\n\n  .dim-header-row {\n    display: grid;\n    grid-template-columns: 64px 1fr 1.3fr 140px;\n    gap: 24px;\n    padding: 0 0 14px;\n    border-bottom: 1px solid var(--rule);\n    font-family: var(--sans);\n    font-weight: 500;\n    font-size: 10px;\n    letter-spacing: 0. line-flex;\n    align-items: center;\n    gap: 10px;\n    transition: color .2s ease;\n  }\n  .dim-row:hover .dim-toggle { color: var(--text); }\n  .dim-toggle-mark {\n    width: 14px; height: 14px;\n    position: relative;\n    display: inline-block;\n  }\n  .dim-toggle-mark::before,\n  .dim-toggle-mark::after {\n    content: '';\n    position: absolute;\n    background: currentColor;\n    transition: transform .25s ease, opacity .25s ease;\n  }\n  .dim-toggle-mark::before {\n    left: 0; right: 0; top: 50%;\n    height: 1px;\n    transform: translateY(-50%);\n  }\n  .dim-toggle-mark::after {\n    top: 0; bottom: 0; left: 50%;\n    width: 1px;\n    transform: translateX(-50%);\n  }\n  .dim-row.open .dim-toggle-mark::after { opacity: 0; transform: translateX(-50%) rotate(90deg); }\n\n  .dim-reveal {\n    display: grid;\n    grid-template-rows: 0fr;\n    transition: grid-template-rows .35s cubic-bezier(.2,.7,.2,1);\n  }\n  .dim-reveal-inner {\n    overflow: hidden;\n  }\n  .dim-row.open .dim-reveal { grid-template-rows: 1fr; }\n\n  .dim-reveal-content {\n    display: grid;\n    grid-template-columns: 64px 1fr 1.3fr 140px;\n    gap: 24px;\n    padding: 4px 0 32px;\n  }\n  .dim-reveal-body {\n    grid-column: 2 / 4;\n    border-left: 1px solid var(--rule);\n    padding-left: 28px;\n    padding-top: 4px;\n  }\n  .dim-reveal-label {\n    font-family: var(--sans);\n    font-weight: 500;\n    font-size: 10px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--accent);\n    margin-bottom: 14px;\n  }\n  .dim-reveal-text {\n    font-family: var(--text-serif);\n    font-weight: 400;\n    font-size: 17px;\n    line-height: 1.55;\n    color: var(--text);\n    max-width: 62ch;\n    letter-spacing: -0.005em;\n  }\n  .dim-reveal-rubric {\n    margin-top: 24px;\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 0;\n    border: 1px solid var(--rule);\n    max-width: 720px;\n  }\n  .rubric-cell {\n    padding: 14px 16px;\n    border-right: 1px solid var(--rule);\n    position: relative;\n  }\n  .rubric-cell:last-child { border-right: none; }\n  .rubric-cell .rc-score {\n    font-family: var(--sans);\n    font-weight: 500;\n    font-size: 10px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    display: flex;\n    align-items: center;\n    gap: 8px;\n    margin-bottom: 6px;\n  }\n  .rubric-cell .rc-score .dot {\n    width: 7px; height: 7px;\n    border-radius: 50%;\n  }\n  .rubric-cell .rc-word {\n    font-family: var(--serif);\n    font-weight: 400;\n    font-size: 15px;\n    color: var(--text);\n    letter-spacing: -0.015em;\n  }\n\n  /* ======================= BANDS SPECTRUM ======================= */\n\n  .spectrum {\n    margin-top: 16px;\n  }\n  .spectrum-bar {\n    position: relative;\n    height: 56px;\n    display: grid;\n    grid-template-columns: 15fr 9fr 8fr 7fr; /* proportional to ranges 0-15, 16-24, 25-32, 33-40 */\n    border: 1px solid var(--rule);\n  }\n  .spectrum-seg {\n    position: relative;\n    border-right: 1px solid var(--rule);\n    display: flex;\n    align-items: center;\n    padding: 0 18px;\n    transition: background .3s ease;\n  }\n  .spectrum-seg:last-child { border-right: none; }\n  .spectrum-seg[data-band=\"crisis\"]  { background: linear-gradient(180deg, rgba(196,64,64,0.18), rgba(196,64,64,0.04)); }\n  .spectrum-seg[data-band=\"under\"]   { background: linear-gradient(180deg, rgba(212,133,74,0.18), rgba(212,133,74,0.04)); }\n  .spectrum-seg[data-band=\"stable\"]  { background: linear-gradient(180deg, rgba(201,169,110,0.18), rgba(201,169,110,0.04)); }\n  .spectrum-seg[data-band=\"ready\"]   { background: linear-gradient(180deg, rgba(90,138,90,0.18), rgba(90,138,90,0.04)); }\n  .spectrum-seg .range {\n    font-family: var(--sans);\n    font-weight: 500;\n    font-size: 11px;\n    letter-spacing: 0.12em;\n    color: var(--text);\n  }\n\n  .spectrum-cursor {\n    position: absolute;\n    top: -10px; bottom: -10px;\n    width: 2px;\n    background: var(--text);\n    transition: left .5s cubic-bezier(.2,.7,.2,1);\n    z-index: 2;\n    pointer-events: none;\n  }\n  .spectrum-cursor .tag {\n    position: absolute;\n    left: 50%;\n    top: -30px;\n    transform: translateX(-50%);\n    font-family: var(--sans);\n    font-weight: 500;\n    font-size: 9.5px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: var(--text);\n    white-space: nowrap;\n  }\n\n  .spectrum-grid {\n    margin-top: 40px;\n    display: grid;\n    grid-template-columns: 15fr 9fr 8fr 7fr;\n    gap: 0;\n    border-top: 1px solid var(--rule);\n  }\n  .sp-cell {\n    padding: 24px 22px 4px;\n    border-right: 1px solid var(--rule);\n    position: relative;\n  }\n  .sp-cell:last-child { border-right: none; }\n  .sp-cell::before {\n    content: '';\n    position: absolute;\n    top: -1px; left: 0;\n    width: 32px;\n    height: 1px;\n    background: var(--seg-color, var(--accent));\n  }\n  .sp-cell .sp-range {\n    font-family: var(--sans);\n    font-weight: 500;\n    font-size: 10px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--text-faint);\n    margin-bottom: 10px;\n  }\n  .sp-cell .sp-name {\n    font-family: var(--serif);\n    font-weight: 400;\n    font-size: 24px;\n    letter-spacing: -0.02em;\n    line-height: 1.1;\n    margin-bottom: 10px;\n    color: var(--seg-color, var(--text));\n  }\n  .sp-cell p {\n    font-family: var(--text-serif);\n    font-weight: 400;\n    font-size: 14.5px;\n    line-height: 1.5;\n    color: var(--text-dim);\n    letter-spacing: -0.005em;\n  }\n\n  /* ======================= METHODOLOGY / PROCESS ======================= */\n  .method {\n    margin-top: 8px;\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 72px;\n    align-items: start;\n  }\n\n  .method-diagram {\n    border: 1px solid var(--rule);\n    background:\n      repeating-linear-gradient(90deg, transparent 0, transparent 38px, rgba(236,231,216,0.015) 38px, rgba(236,231,216,0.015) 39px);\n    padding: 36px 32px 32px;\n    position: relative;\n  }\n  .method-diagram .md-title {\n    font-family: var(--sans);\n    font-weight: 500;\n    font-size: 10px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--text-mute);\n    margin-bottom: 8px;\n    display: flex;\n    justify-content: space-between;\n  }\n  .method-diagram .md-title em {\n    font-family: var(--text-serif);\n    font-style: italic;\n    font-weight: 400;\n    font-size: 12px;\n    color: var(--text-faint);\n    text-transform: none;\n    letter-spacing: -0.02em;\n  }\n\n  .md-formula {\n    font-family: var(--serif);\n    font-weight: 300;\n    font-size: clamp(28px, 3.2vw, 42px);\n    line-height: 1.1;\n    letter-spacing: -0.025em;\n    color: var(--text);\n    margin: 14px 0 20px;\n    padding: 18px 0;\n    border-top: 1px solid var(--rule);\n    border-bottom: 1px solid var(--rule);\n    display: flex;\n    align-items: baseline;\n    gap: 14px;\n    flex-wrap: wrap;\n  }\n  .md-formula .tok {\n    display: inline-flex;\n    align-items: baseline;\n  }\n  .md-formula .var {\n    font-family: var(--text-serif);\n    font-style: italic;\n    color: var(--accent);\n    font-weight: 400;\n    letter-spacing: -0.04em;\n  }\n  .md-formula .op {\n    font-family: var(--sans);\n    font-weight: 400;\n    color: var(--text-mute);\n    font-size: 0.85em;\n    margin: 0 2px;\n  }\n  .md-formula .paren {\n    color: var(--text-mute);\n  }\n\n  .md-legend {\n    display: flex;\n    flex-direction: column;\n    gap: 12px;\n    font-family: var(--sans);\n    font-size: 13px;\n    color: var(--text-dim);\n  }\n  .md-legend-row {\n    display: grid;\n    grid-template-columns: 88px 1fr;\n    gap: 14px;\n    align-items: baseline;\n    padding: 10px 0;\n    border-bottom: 1px solid var(--rule-soft);\n  }\n  .md-legend-row:last-child { border-bottom: none; }\n  .md-legend-row .lk {\n    font-family: var(--text-serif);\n    font-style: italic;\n    font-weight: 400;\n    font-size: 15px;\n    color: var(--accent);\n    letter-spacing: -0.02em;\n  }\n  .md-legend-row .lv {\n    font-family: var(--sans);\n    font-weight: 400;\n    font-size: 13.5px;\n    color: var(--text-dim);\n    line-height: 1.45;\n  }\n\n  /* Process steps */\n  .process {\n    display: flex;\n    flex-direction: column;\n    gap: 0;\n  }\n  .process-intro {\n    font-family: var(--text-serif);\n    font-weight: 400;\n    font-size: 17px;\n    line-height: 1.5;\n    color: var(--text-dim);\n    margin-bottom: 28px;\n    letter-spacing: -0.005em;\n    max-width: 42ch;\n  }\n  .step {\n    display: grid;\n    grid-template-columns: 48px 1fr auto;\n    gap: 20px;\n    padding: 22px 0;\n    border-top: 1px solid var(--rule-soft);\n    align-items: baseline;\n  }\n  .step:first-of-type { border-top: 1px solid var(--rule); }\n  .step:last-of-type { border-bottom: 1px solid var(--rule); }\n  .step .step-n {\n    font-family: var(--sans);\n    font-weight: 500;\n    font-size: 11px;\n    letter-spacing: 0.18em;\n    color: var(--accent);\n  }\n  .step .step-body h4 {\n    font-family: var(--serif);\n    font-weight: 400;\n    font-size: 22px;\n    letter-spacing: -0.02em;\n    color: var(--text);\n    margin-bottom: 4px;\n  }\n  .step .step-body h4 em { font-family: var(--text-serif); font-style: italic; }\n  .step .step-body p {\n    font-family: var(--sans);\n    font-weight: 400;\n    font-size: 13.5px;\n    color: var(--text-dim);\n    line-height: 1.5;\n    max-width: 46ch;\n  }\n  .step .step-time {\n    font-family: var(--text-serif);\n    font-style: italic;\n    font-weight: 400;\n    font-size: 13px;\n    color: var(--text-faint);\n    letter-spacing: -0.02em;\n  }\n\n  /* ======================= BUILT FOR ======================= */\n  .fit {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 0;\n    border: 1px solid var(--rule);\n    margin-top: 8px;\n  }\n  .fit-col {\n    padding: 40px 40px 44px;\n    border-right: 1px solid var(--rule);\n  }\n  .fit-col:last-child { border-right: none; }\n  .fit-col .fk {\n    font-family: var(--sans);\n    font-weight: 500;\n    font-size: 10.5px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    margin-bottom: 16px;\n  }\n  .fit-col.yes .fk { color: var(--accent); }\n  .fit-col.no .fk { color: var(--text-faint); }\n  .fit-col h3 {\n    font-size: 26px;\n    margin-bottom: 24px;\n    max-width: 18ch;\n    line-height: 1.12;\n  }\n  .fit-col.no h3 { color: var(--text-mute); }\n  .fit-col ul {\n    list-style: none;\n  }\n  .fit-col li {\n    padding: 12px 0;\n    border-bottom: 1px solid var(--rule-soft);\n    font-family: var(--sans);\n    font-size: 14.5px;\n    color: var(--text);\n    display: flex;\n    align-items: baseline;\n    gap: 12px;\n  }\n  .fit-col li:last-child { border-bottom: none; }\n  .fit-col li::before {\n    content: '—';\n    color: var(--accent);\n    font-family: var(--sans);\n    font-weight: 500;\n    flex-shrink: 0;\n  }\n  .fit-col.no li { color: var(--text-mute); }\n  .fit-col.no li::before { content: '×'; color: var(--text-faint); font-size: 14px; }\n\n  /* ======================= PROPRIETARY CALLOUT ======================= */\n  .proprietary {\n    margin-top: 72px;\n    padding: 48px 56px;\n    background: var(--bg-lift);\n    border-left: 2px solid var(--accent);\n    display: grid;\n    grid-template-columns: 1fr 1.4fr;\n    gap: 56px;\n    align-items: center;\n  }\n  .proprietary .plabel {\n    font-family: var(--sans);\n    font-weight: 500;\n    font-size: 10.5px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--accent);\n    margin-bottom: 16px;\n    display: flex;\n    align-items: center;\n    gap: 12px;\n  }\n  .proprietary .plabel::before {\n    content: '';\n    width: 7px; height: 7px;\n    background: var(--accent);\n    border-radius: 50%;\n    box-shadow: 0 0 10px var(--accent-soft);\n    animation: pulse 2.4s ease-in-out infinite;\n  }\n  @keyframes pulse {\n    0%,100% { opacity: 1; box-shadow: 0 0 0 var(--accent-soft); }\n    50%     { opacity: 0.5; box-shadow: 0 0 12px var(--accent-soft); }\n  }\n  .proprietary h3 {\n    font-family: var(--serif);\n    font-weight: 300;\n    font-size: 36px;\n    line-height: 1.05;\n    letter-spacing: -0.025em;\n    max-width: 16ch;\n  }\n  .proprietary h3 em { font-family: var(--text-serif); font-style: italic; color: var(--accent); }\n  .proprietary p {\n    font-family: var(--text-serif);\n    font-weight: 400;\n    font-size: 16px;\n    line-height: 1.55;\n    color: var(--text-dim);\n    max-width: 52ch;\n    letter-spacing: -0.005em;\n  }\n\n  /* ======================= CTA ======================= */\n  .cta {\n    text-align: center;\n    padding: 148px 0 136px;\n    position: relative;\n  }\n  .cta .eyebrow { justify-content: center; margin-bottom: 28px; }\n  .cta h2 {\n    font-size: clamp(48px, 6.2vw, 96px);\n    margin: 0 auto 24px;\n    max-width: 18ch;\n    line-height: 0.98;\n  }\n  .cta h2 em { font-family: var(--text-serif); font-style: italic; color: var(--accent); }\n  .cta .cta-sub {\n    font-family: var(--text-serif);\n    font-weight: 400;\n    font-size: 19px;\n    line-height: 1.5;\n    color: var(--text-dim);\n    max-width: 52ch;\n    margin: 0 auto 48px;\n    letter-spacing: -0.01em;\n  }\n  .btn-primary {\n    display: inline-flex;\n    align-items: center;\n    gap: 16px;\n    font-family: var(--sans);\n    font-weight: 500;\n    font-size: 14px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    padding: 20px 28px 18px;\n    background: var(--accent);\n    color: var(--bg);\n    border: 1px solid var(--accent);\n    transition: all .2s ease;\n    cursor: pointer;\n  }\n  .btn-primary:hover { background: var(--accent-hot); border-color: var(--accent-hot); gap: 20px; }\n  .btn-primary .arr {\n    font-family: var(--sans);\n    font-weight: 400;\n    font-size: 16px;\n    transition: transform .2s ease;\n  }\n  .btn-primary:hover .arr { transform: translateX(4px); }\n\n  .cta-fineprint {\n    margin-top: 32px;\n    font-family: var(--sans);\n    font-weight: 400;\n    font-size: 12px;\n    color: var(--text-faint);\n    letter-spacing: 0.04em;\n  }\n  .cta-fineprint em { font-family: var(--text-serif); font-style: italic; color: var(--text-mute); }\n\n  /* ======================= FOOTER ======================= */\n  footer {\n    padding: 32px 56px;\n    border-top: 1px solid var(--rule);\n    max-width: 1240px;\n    margin: 0 auto;\n    display: flex;\n    justify-content: space-between;\n    align-items: baseline;\n    gap: 24px;\n    flex-wrap: wrap;\n  }\n  footer span, footer a {\n    font-family: var(--sans);\n    font-weight: 400;\n    font-size: 11px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--text-faint);\n  }\n  footer .brand {\n    font-family: var(--serif);\n    font-weight: 400;\n    font-size: 14px;\n    letter-spacing: -0.015em;\n    text-transform: none;\n    color: var(--text-dim);\n  }\n  footer .brand em {\n    font-family: var(--text-serif);\n    font-style: italic;\n    color: var(--text-mute);\n  }\n\n  /* ======================= RESPONSIVE ======================= */\n  @media (max-width: 1080px) {\n    .shell, .nav-inner, footer { padding-left: 36px; padding-right: 36px; }\n    .instrument-body { grid-template-columns: 1fr; }\n    .readout { border-right: none; border-bottom: 1px solid var(--rule); }\n  }\n\n  @media (max-width: 820px) {\n    section { padding: 72px 0; }\n    .shell, .nav-inner, footer { padding-left: 24px; padding-right: 24px; }\n    .nav-links { display: none; }\n    .running-head { display: none; }\n\n    .hero-footing { grid-template-columns: 1fr; gap: 44px; }\n    .hero-spec-grid { grid-template-columns: 1fr; gap: 16px; }\n\n    .sec-head { grid-template-columns: 1fr; gap: 24px; }\n\n    /* Moment strip collapses to horizontal scroll */\n    .moment-strip { grid-template-columns: 1fr; }\n    .moment-strip-label { border-right: none; border-bottom: 1px solid var(--rule); flex-direction: row; justify-content: space-between; padding: 16px 24px; }\n    .moments {\n      grid-template-columns: repeat(5, minmax(180px, 1fr));\n      overflow-x: auto;\n      scrollbar-width: thin;\n    }\n    .moment { min-height: auto; padding: 18px 18px 16px; }\n\n    .readout { padding: 28px 24px; }\n    .readout-name { font-size: 30px; }\n    .radar-panel { padding: 24px 24px 28px; }\n    .radar-footer { grid-template-columns: 1fr; gap: 20px; }\n    .band-chip { text-align: left; }\n    .score-legend { padding: 14px 24px 20px; gap: 14px; }\n\n    .dim-header-row, .dim-row-inner, .dim-reveal-content { grid-template-columns: 40px 1fr; gap: 14px; }\n    .dim-header-row > *:nth-child(3), .dim-header-row > *:nth-child(4) { display: none; }\n    .dim-row-inner > .dim-hint { grid-column: 2; font-size: 14px; margin-top: 6px; }\n    .dim-row-inner > .dim-right { grid-column: 2; justify-content: flex-start; margin-top: 10px; }\n    .dim-reveal-body { grid-column: 1 / -1; padding-left: 0; border-left: none; border-top: 1px solid var(--rule-soft); padding-top: 18px; }\n    .dim-reveal-rubric { grid-template-columns: 1fr 1fr; }\n\n    .spectrum-bar { grid-template-columns: 15fr 9fr 8fr 7fr; height: 48px; }\n    .spectrum-seg .range { font-size: 10px; }\n    .spectrum-grid { grid-template-columns: 1fr; }\n    .sp-cell { border-right: none; border-bottom: 1px solid var(--rule); padding: 22px 0; }\n    .sp-cell:last-child { border-bottom: none; }\n\n    .method { grid-template-columns: 1fr; gap: 48px; }\n\n    .fit { grid-template-columns: 1fr; }\n    .fit-col { border-right: none; border-bottom: 1px solid var(--rule); padding: 28px 24px; }\n    .fit-col:last-child { border-bottom: none; }\n\n    .proprietary { grid-template-columns: 1fr; padding: 32px 28px; gap: 20px; }\n    .proprietary h3 { font-size: 28px; }\n\n    .cta { padding: 88px 0 96px; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<nav class=\"top\">\n  <div class=\"nav-inner\">\n    <a href=\"#top\" class=\"wordmark\">Backroom <em>&nbsp;/ kara redman<\u002Fem><\u002Fa>\n    <div class=\"nav-links\">\n      <a href=\"#instrument\">The Instrument<\u002Fa>\n      <a href=\"#dimensions\">Ten Dimensions<\u002Fa>\n      <a href=\"#bands\">Bands<\u002Fa>\n      <a href=\"#process\">Process<\u002Fa>\n      <a href=\"#stress-test\">Stress Test<\u002Fa>\n    <\u002Fdiv>\n    <span class=\"nav-tag\">Brand Pressure Index · BPI<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<main>\n\n  <!-- ============ HERO ============ -->\n  <section class=\"hero\" id=\"top\">\n    <div class=\"shell\">\n      <div class=\"running-head\">No. 01 / BPI Sell Sheet / <em style=\"font-family: var(--text-serif); font-style: italic;\">For Founders &amp; Operating Partners<\u002Fem><\u002Fdiv>\n      <div class=\"hero-meta\">\n        <span class=\"k\">Backroom · Brand Pressure Index<\u002Fspan>\n        <span class=\"divider-dot\" style=\"text-align:center;\">·<\u002Fspan>\n        <span class=\"k\" style=\"text-align:right;\">Confidential · Circulate Freely<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"hero-lock\">\n        <h1>\n          Most brands<br>\n          look fine.<br>\n          <span class=\"line-2\">Until they don’t.<\u002Fspan>\n        <\u002Fh1>\n      <\u002Fdiv>\n\n      <div class=\"hero-footing\">\n        <p class=\"hero-lede\">\n          The Brand Pressure Index is a scored diagnostic that tells you exactly where your brand will hold — <em>and where it will break<\u002Fem> — before you’re inside the moment that tests it.\n        <\u002Fp>\n        <div class=\"hero-spec\">\n          <div class=\"hero-spec-grid\">\n            <div>\n              <div class=\"key\">Diagnose<\u002Fdiv>\n              <div class=\"val\">Ten <em>dimensions,<\u002Fem> scored against a proprietary rubric.<\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div class=\"key\">Weight<\u002Fdiv>\n              <div class=\"val\">Calibrated to your <em>pressure moment.<\u002Fem><\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div class=\"key\">Prescribe<\u002Fdiv>\n              <div class=\"val\">One clear answer on what to <em>fix first.<\u002Fem><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ INSTRUMENT ============ -->\n  <section id=\"instrument\">\n    <div class=\"shell\">\n      <div class=\"sec-head\">\n        <div class=\"lhs\">\n          <div class=\"eyebrow\">§ 01 · The Instrument<\u002Fdiv>\n          <h2>The same ten dimensions don’t <em>matter equally<\u002Fem> in every moment.<\u002Fh2>\n        <\u002Fdiv>\n        <p class=\"rhs\">\n          Pick the moment your company is navigating. The dimensions that determine whether the brand holds — or fractures — shift with it. The readout below is an illustrative composite, not a real client.\n        <\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"instrument\">\n\n        <!-- Moment selector -->\n        <div class=\"moment-strip\">\n          <div class=\"moment-strip-label\">\n            <span class=\"k\">Pressure<br>Moment<\u002Fspan>\n            <span class=\"hint\">Select one<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"moments\" id=\"momentTags\">\n            <button class=\"moment active\" data-moment=\"leadership\">\n              <span class=\"m-num\">01<\u002Fspan>\n              <span class=\"m-name\">Leadership<br>Transition<\u002Fspan>\n            <\u002Fbutton>\n            <button class=\"moment\" data-moment=\"fundraising\">\n              <span class=\"m-num\">02<\u002Fspan>\n              <span class=\"m-name\">Fundraising <em>/<\u002Fem><br>Pre-Raise<\u002Fspan>\n            <\u002Fbutton>\n            <button class=\"moment\" data-moment=\"sale\">\n              <span class=\"m-num\">03<\u002Fspan>\n              <span class=\"m-name\">Preparing<br>for Sale<\u002Fspan>\n            <\u002Fbutton>\n            <button class=\"moment\" data-moment=\"post\">\n              <span class=\"m-num\">04<\u002Fspan>\n              <span class=\"m-name\">Post-Acquisition <em>/<\u002Fem><br>M&amp;A Integration<\u002Fspan>\n            <\u002Fbutton>\n            <button class=\"moment\" data-moment=\"outgrown\">\n              <span class=\"m-num\">05<\u002Fspan>\n              <span class=\"m-name\">Outgrown<br>the Brand<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Body: readout + radar -->\n        <div class=\"instrument-body\">\n\n          <div class=\"readout\">\n            <div class=\"readout-head\">\n              <div class=\"readout-k\">Sample Scorecard · Composite<\u002Fdiv>\n              <div class=\"readout-name\" id=\"momentName\">Leadership <em>Transition<\u002Fem><\u002Fdiv>\n            <\u002Fdiv>\n            <p class=\"readout-blurb\" id=\"momentBlurb\">When the person at the top changes, the brand lives or dies based on whether the organization can carry it without them. If alignment, operations, and culture aren’t strong, the brand fragments.<\u002Fp>\n\n            <div class=\"weighted-block\">\n              <div class=\"wk\">\n                <span>Dimensions Weighted 1.5×<\u002Fspan>\n                <em>Calibrated to this moment<\u002Fem>\n              <\u002Fdiv>\n              <div class=\"weighted-items\" id=\"weightedItems\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"radar-panel\">\n            <div class=\"radar-frame\">\n              <span class=\"corner tl\"><\u002Fspan><span class=\"corner tr\"><\u002Fspan>\n              <span class=\"corner bl\"><\u002Fspan><span class=\"corner br\"><\u002Fspan>\n              <svg class=\"radar-svg\" viewBox=\"-300 -300 600 600\" id=\"radarSvg\" aria-label=\"Brand Pressure Index radar\"><\u002Fsvg>\n            <\u002Fdiv>\n\n            <div class=\"radar-footer\">\n              <div>\n                <div class=\"score-big\"><span id=\"scoreNum\">22<\u002Fspan><span class=\"denom\">/40<\u002Fspan><\u002Fdiv>\n                <div class=\"score-cap\">Sample Composite Score<\u002Fdiv>\n              <\u002Fdiv>\n\n              <div class=\"score-scale\" aria-hidden=\"true\">\n                <div class=\"scale-track\">\n                  <div class=\"scale-seg f1\" title=\"0–15 In Crisis\"><\u002Fdiv>\n                  <div class=\"scale-seg f2\" title=\"16–24 Under Pressure\"><\u002Fdiv>\n                  <div class=\"scale-seg f3\" title=\"25–32 Stable but Exposed\"><\u002Fdiv>\n                  <div class=\"scale-seg f4\" title=\"33–40 Pressure-Ready\"><\u002Fdiv>\n                  <div class=\"scale-marker\" id=\"scoreMarker\" style=\"left: 55%;\"><\u002Fdiv>\n                <\u002Fdiv>\n                <div class=\"scale-ticks\">\n                  <span>0<\u002Fspan><span>15<\u002Fspan><span>24<\u002Fspan><span>32<\u002Fspan><span>40<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <div class=\"band-chip\">\n                <div class=\"band-label\" id=\"bandName\" style=\"color: var(--s2);\">Under Pressure<\u002Fdiv>\n                <div class=\"band-sub\">Scoring Band<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n\n        <!-- Score legend -->\n        <div class=\"score-legend\">\n          <div class=\"legend-item\"><span class=\"dot\" style=\"background: var(--s1);\"><\u002Fspan>1 · Broken <em>— will fail under pressure<\u002Fem><\u002Fdiv>\n          <div class=\"legend-sep\"><\u002Fdiv>\n          <div class=\"legend-item\"><span class=\"dot\" style=\"background: var(--s2);\"><\u002Fspan>2 · Exposed <em>— visible gaps<\u002Fem><\u002Fdiv>\n          <div class=\"legend-sep\"><\u002Fdiv>\n          <div class=\"legend-item\"><span class=\"dot\" style=\"background: var(--s3);\"><\u002Fspan>3 · Holding <em>— foundation is solid<\u002Fem><\u002Fdiv>\n          <div class=\"legend-sep\"><\u002Fdiv>\n          <div class=\"legend-item\"><span class=\"dot\" style=\"background: var(--s4);\"><\u002Fspan>4 · Strong <em>— holding in this area<\u002Fem><\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ DIMENSIONS ============ -->\n  <section id=\"dimensions\">\n    <div class=\"shell\">\n      <div class=\"sec-head\">\n        <div class=\"lhs\">\n          <div class=\"eyebrow\">§ 02 · Ten Dimensions<\u002Fdiv>\n          <h2>Where brands <em>actually break.<\u002Fem><\u002Fh2>\n        <\u002Fdiv>\n        <p class=\"rhs\">\n          Ten dimensions cover the full surface area of brand risk — message, operations, architecture, culture, infrastructure. Each is scored against observed evidence, not self-perception. Click any dimension to see what it reveals under pressure.\n        <\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"dim-header-row\">\n        <span>No.<\u002Fspan>\n        <span>Dimension<\u002Fspan>\n        <span>The question it asks<\u002Fspan>\n        <span style=\"text-align: right;\">Detail<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"dim-list\" id=\"dimList\"><\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ BANDS ============ -->\n  <section id=\"bands\">\n    <div class=\"shell\">\n      <div class=\"sec-head\">\n        <div class=\"lhs\">\n          <div class=\"eyebrow\">§ 03 · How the Score Reads<\u002Fdiv>\n          <h2>Four bands. <em>One verdict.<\u002Fem><\u002Fh2>\n        <\u002Fdiv>\n        <p class=\"rhs\">\n          The composite score lands in one of four bands. The band names the condition; the score locates the company inside it. Your sample score sits where the cursor is.\n        <\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"spectrum\">\n        <div class=\"spectrum-bar\">\n          <div class=\"spectrum-seg\" data-band=\"crisis\"><span class=\"range\">0 — 15<\u002Fspan><\u002Fdiv>\n          <div class=\"spectrum-seg\" data-band=\"under\"><span class=\"range\">16 — 24<\u002Fspan><\u002Fdiv>\n          <div class=\"spectrum-seg\" data-band=\"stable\"><span class=\"range\">25 — 32<\u002Fspan><\u002Fdiv>\n          <div class=\"spectrum-seg\" data-band=\"ready\"><span class=\"range\">33 — 40<\u002Fspan><\u002Fdiv>\n          <div class=\"spectrum-cursor\" id=\"spectrumCursor\" style=\"left: 55%;\">\n            <span class=\"tag\" id=\"spectrumTag\">Sample · 22<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"spectrum-grid\">\n          <div class=\"sp-cell\" style=\"--seg-color: var(--s1);\">\n            <div class=\"sp-range\">0 — 15<\u002Fdiv>\n            <div class=\"sp-name\">In Crisis<\u002Fdiv>\n            <p>The brand is actively working against the company. If a transition is underway, this is urgent.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"sp-cell\" style=\"--seg-color: var(--s2);\">\n            <div class=\"sp-range\">16 — 24<\u002Fdiv>\n            <div class=\"sp-name\">Under Pressure<\u002Fdiv>\n            <p>Significant vulnerabilities costing credibility, speed, or both. Multiple dimensions need work and the order matters.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"sp-cell\" style=\"--seg-color: var(--s3);\">\n            <div class=\"sp-range\">25 — 32<\u002Fdiv>\n            <div class=\"sp-name\">Stable but Exposed<\u002Fdiv>\n            <p>Foundation exists but real gaps are exposed. Fix the two or three that matter most for the current pressure moment.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"sp-cell\" style=\"--seg-color: var(--s4);\">\n            <div class=\"sp-range\">33 — 40<\u002Fdiv>\n            <div class=\"sp-name\">Pressure-Ready<\u002Fdiv>\n            <p>Brand is in strong shape. Minor tuning, not structural repair.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ METHODOLOGY + PROCESS ============ -->\n  <section id=\"process\">\n    <div class=\"shell\">\n      <div class=\"sec-head\">\n        <div class=\"lhs\">\n          <div class=\"eyebrow\">§ 04 · Method &amp; Cadence<\u002Fdiv>\n          <h2>Four weeks. <em>One clear answer.<\u002Fem><\u002Fh2>\n        <\u002Fdiv>\n        <p class=\"rhs\">\n          The BPI is powered by Backroom’s scoring engine. Every score is evidence-based, weighted to the pressure moment, and sorted for priority — so the worst score on the most critical dimension surfaces first.\n        <\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"method\">\n\n        <div class=\"method-diagram\">\n          <div class=\"md-title\">\n            <span>Priority Formula<\u002Fspan>\n            <em>how the engine sorts<\u002Fem>\n          <\u002Fdiv>\n          <div class=\"md-formula\">\n            <span class=\"tok\">Priority<\u002Fspan>\n            <span class=\"op\">=<\u002Fspan>\n            <span class=\"paren\">(<\u002Fspan>\n            <span class=\"tok\">4<\u002Fspan>\n            <span class=\"op\">−<\u002Fspan>\n            <span class=\"tok var\">score<\u002Fspan>\n            <span class=\"paren\">)<\u002Fspan>\n            <span class=\"op\">×<\u002Fspan>\n            <span class=\"tok var\">weight<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"md-legend\">\n            <div class=\"md-legend-row\">\n              <span class=\"lk\">score<\u002Fspan>\n              <span class=\"lv\">1–4, evidence-based. A 1 is broken; a 4 is holding.<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"md-legend-row\">\n              <span class=\"lk\">weight<\u002Fspan>\n              <span class=\"lv\">1.0× default. 1.5× if this dimension is heavy for your pressure moment.<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"md-legend-row\">\n              <span class=\"lk\">sort<\u002Fspan>\n              <span class=\"lv\">Highest priority surfaces first. The worst score on the most critical dimension gets the top of the page.<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"process\">\n          <p class=\"process-intro\">\n            The full engagement is four weeks, end to end. Each stage narrows the question until a single recommendation remains.\n          <\u002Fp>\n          <div class=\"step\">\n            <span class=\"step-n\">01<\u002Fspan>\n            <div class=\"step-body\">\n              <h4>Stress <em>Test<\u002Fem><\u002Fh4>\n              <p>A 16-question diagnostic establishes the pressure moment and flags which dimensions are most exposed. No charge. Directional only.<\u002Fp>\n            <\u002Fdiv>\n            <span class=\"step-time\">~15 min<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"step\">\n            <span class=\"step-n\">02<\u002Fspan>\n            <div class=\"step-body\">\n              <h4>Evidence<\u002Fh4>\n              <p>Targeted interviews, a facilitated session, and desk research probe the flagged dimensions. Structured investigation, not assumption.<\u002Fp>\n            <\u002Fdiv>\n            <span class=\"step-time\">weeks 1–3<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"step\">\n            <span class=\"step-n\">03<\u002Fspan>\n            <div class=\"step-body\">\n              <h4>Scorecard<\u002Fh4>\n              <p>Ten dimensions scored against the proprietary rubric. Weighting applied. Deep dives auto-generated for what’s broken.<\u002Fp>\n            <\u002Fdiv>\n            <span class=\"step-time\">week 4<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"step\">\n            <span class=\"step-n\">04<\u002Fspan>\n            <div class=\"step-body\">\n              <h4>Readout<\u002Fh4>\n              <p>A sixty-minute executive readout with prioritized recommendations. One clear answer on what to fix first, and why.<\u002Fp>\n            <\u002Fdiv>\n            <span class=\"step-time\">60 min<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n\n      <div class=\"proprietary\">\n        <div>\n          <div class=\"plabel\">Proprietary Scoring Engine<\u002Fdiv>\n          <h3>The BPI is powered by Backroom’s <em>scoring software.<\u002Fem><\u002Fh3>\n        <\u002Fdiv>\n        <p>\n          Every score is evidence-based, weighted to your pressure moment, and sorted for priority. No two scorecards read the same, because no two pressure moments look the same.\n        <\u002Fp>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ BUILT FOR ============ -->\n  <section id=\"fit\">\n    <div class=\"shell\">\n      <div class=\"sec-head\">\n        <div class=\"lhs\">\n          <div class=\"eyebrow\">§ 05 · Fit<\u002Fdiv>\n          <h2>Built for decisions, <em>not presentations.<\u002Fem><\u002Fh2>\n        <\u002Fdiv>\n        <p class=\"rhs\">\n          The BPI is a diagnostic instrument, not a brand deck. It produces a scored read on where the brand will hold or fail — and a single recommendation on what to fix first. If that’s not what you’re looking for, this isn’t the right tool.\n        <\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"fit\">\n        <div class=\"fit-col yes\">\n          <div class=\"fk\">— Built for<\u002Fdiv>\n          <h3>Founders, CEOs, and operating partners facing a pressure moment.<\u002Fh3>\n          <ul>\n            <li>Preparing for a sale, raise, or exit<\u002Fli>\n            <li>Stepping into a leadership transition<\u002Fli>\n            <li>Inside a post-acquisition integration<\u002Fli>\n            <li>Feeling the brand outpaced by the company<\u002Fli>\n            <li>Deciding whether a rebrand is actually the problem<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"fit-col no\">\n          <div class=\"fk\">— Not built for<\u002Fdiv>\n          <h3>Teams shopping for a logo refresh or a brand deck.<\u002Fh3>\n          <ul>\n            <li>CMOs looking for a design sprint<\u002Fli>\n            <li>Marketing teams wanting a campaign idea<\u002Fli>\n            <li>Companies without a pressure moment to navigate<\u002Fli>\n            <li>Anyone looking for a rebrand pitch disguised as strategy<\u002Fli>\n            <li>Organizations that want their self-perception confirmed<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ CTA ============ -->\n  <section class=\"cta\" id=\"stress-test\">\n    <div class=\"shell\">\n      <div class=\"eyebrow plain\" style=\"justify-content: center; display: inline-flex;\">Start Here<\u002Fdiv>\n      <h2>Is your brand ready for<br>the moment <em>that tests it?<\u002Fem><\u002Fh2>\n      <p class=\"cta-sub\">\n        Begin with the Brand Stress Test — a 16-question diagnostic that tells you where you stand and whether a full BPI is warranted.\n      <\u002Fp>\n      <a class=\"btn-primary\" href=\"https://backroom.io\" target=\"_blank\" rel=\"noopener\">\n        Take the Stress Test\n        <span class=\"arr\">→<\u002Fspan>\n      <\u002Fa>\n      <div class=\"cta-fineprint\">\n        <em>Free · 15 minutes · Directional read<\u002Fem>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fmain>\n\n<footer>\n  <span class=\"brand\">Backroom <em>/ kara redman<\u002Fem><\u002Fspan>\n  <span>Brand Pressure Index · BPI<\u002Fspan>\n  <span>For Founders &amp; Operating Partners<\u002Fspan>\n<\u002Ffooter>\n\n<script>\n  /* ======================== DATA ======================== */\n  const dimensions = [\n    { n: \"Promise-to-Delivery Gap\",  hint: \"Is what you say what you actually do?\", pressure: \"Under pressure, the gap between marketing's claims and operations' ability to deliver becomes the headline risk. Customers and acquirers both notice fast.\" },\n    { n: \"Internal Alignment\",       hint: \"Does your team tell the same story?\", pressure: \"When leaders describe the company differently, the brand fragments the moment the founder, CEO, or acquirer enters the room.\" },\n    { n: \"Narrative Coherence\",      hint: \"Does the brand hold together across touchpoints?\", pressure: \"When website, deck, and sales team tell three different stories, prospects are confused before the first call. Buyers read it as risk.\" },\n    { n: \"Operational Capacity\",     hint: \"Can operations deliver what the brand promises?\", pressure: \"Brand promises that operations can't keep show up in reviews, churn, and diligence. The gap is structural, not incidental.\" },\n    { n: \"Transition Readiness\",     hint: \"Is the brand prepared for what's about to happen?\", pressure: \"Most brands arrive at a transition with no plan. When the change hits, messaging lags the reality and the team improvises — badly.\" },\n    { n: \"Audience Translation\",     hint: \"Does the story change for each audience that matters?\", pressure: \"Investors hear the customer pitch. Enterprise buyers hear the startup pitch. Nobody gets the story they need to say yes.\" },\n    { n: \"Market Position & Risk\",   hint: \"Is differentiation clear, specific, and defensible?\", pressure: \"When every team member answers \\u201cwhat makes us different\\u201d differently — or with clich\\u00e9s — the position isn't defensible under buyer or investor scrutiny.\" },\n    { n: \"Architecture Complexity\",  hint: \"How many brands are in play — and are the relationships sorted?\", pressure: \"Acquired entities, legacy sites, and unsorted sub-brands make customers wonder who they're buying from. Worse during or after M&A.\" },\n    { n: \"Cultural Integration\",     hint: \"Do employees across teams feel like one company?\", pressure: \"Post-acquisition, two cultures under one logo read as one company on the website and two companies in the hallways. It leaks externally.\" },\n    { n: \"Adoption Infrastructure\",  hint: \"Are there systems to carry the brand without relying on one person?\", pressure: \"If the brand lives in the founder's head, it walks out the door when they leave. If it lives in the CMO's deck, the sales team rewrites it anyway.\" }\n  ];\n\n  const rubricWords = ['Broken', 'Exposed', 'Holding', 'Strong'];\n  const scoreColors = { 1: '#c44040', 2: '#d4854a', 3: '#c9a96e', 4: '#5a8a5a' };\n\n  // Per 04-pressure-moment-weighting.md (1-indexed, converted to 0-indexed)\n  const moments = {\n    leadership: {\n      name: \"Leadership <em>Transition<\u002Fem>\",\n      blurb: \"When the person at the top changes, the brand lives or dies based on whether the organization can carry it without them. If alignment, operations, and culture aren\\u2019t strong, the brand fragments.\",\n      weighted: [1, 3, 4, 8],\n      scores:   [2, 1, 3, 2, 1, 3, 3, 3, 2, 2]\n    },\n    fundraising: {\n      name: \"Fundraising <em>/<\u002Fem> Pre-Raise\",\n      blurb: \"Investors are buying the story and the market position. If the narrative doesn\\u2019t hold up to diligence, or the company can\\u2019t articulate value differently to investors vs. customers, the raise stalls.\",\n      weighted: [0, 2, 5, 6],\n      scores:   [2, 3, 2, 3, 3, 2, 2, 4, 3, 3]\n    },\n    sale: {\n      name: \"Preparing for <em>Sale / Exit<\u002Fem>\",\n      blurb: \"Buyers check whether claims match reality, whether the story holds up to diligence, whether the company is ready for what comes next, and whether the market position is defensible enough to be worth acquiring.\",\n      weighted: [0, 2, 4, 6],\n      scores:   [3, 3, 2, 3, 2, 3, 2, 4, 3, 3]\n    },\n    post: {\n      name: \"Post-Acquisition <em>/<\u002Fem> M&amp;A Integration\",\n      blurb: \"Four things kill post-merger brand integration: misaligned leadership, unprepared transitions, unsorted architecture, and unmerged cultures. You can have a great narrative and still fail on any of these.\",\n      weighted: [1, 4, 7, 8],\n      scores:   [3, 2, 3, 3, 1, 3, 3, 1, 1, 2]\n    },\n    outgrown: {\n      name: \"Outgrown <em>the Brand<\u002Fem>\",\n      blurb: \"The company evolved and the brand didn\\u2019t keep up. New markets, new products, competitive shifts, or portfolio complexity the current brand wasn\\u2019t built for. The fix fails when the new story doesn\\u2019t translate, doesn\\u2019t differentiate, or has no infrastructure to carry it.\",\n      weighted: [2, 5, 6, 9],\n      scores:   [3, 3, 2, 3, 3, 2, 2, 3, 3, 2]\n    }\n  };\n\n  function bandFor(total) {\n    if (total <= 15) return { name: 'In Crisis',          color: '#c44040', key: 'crisis' };\n    if (total <= 24) return { name: 'Under Pressure',     color: '#d4854a', key: 'under' };\n    if (total <= 32) return { name: 'Stable but Exposed', color: '#c9a96e', key: 'stable' };\n    return              { name: 'Pressure-Ready',         color: '#5a8a5a', key: 'ready' };\n  }\n\n  /* ======================== DIMENSION LIST ======================== */\n  const dimList = document.getElementById('dimList');\n  dimensions.forEach((d, i) => {\n    const row = document.createElement('div');\n    row.className = 'dim-row';\n    row.dataset.index = i;\n    row.innerHTML = `\n      <div class=\"dim-row-inner\">\n        <span class=\"dim-idx\">${String(i+1).padStart(2,'0')}<\u002Fspan>\n        <div class=\"dim-name\">${d.n.replace('&', '&amp;')}<\u002Fdiv>\n        <div class=\"dim-hint\">${d.hint}<\u002Fdiv>\n        <div class=\"dim-right\">\n          <span class=\"dim-weight-tag\">Weighted 1.5×<\u002Fspan>\n          <span class=\"dim-toggle\">Read<span class=\"dim-toggle-mark\"><\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"dim-reveal\">\n        <div class=\"dim-reveal-inner\">\n          <div class=\"dim-reveal-content\">\n            <div class=\"dim-reveal-body\">\n              <div class=\"dim-reveal-label\">What it reveals under pressure<\u002Fdiv>\n              <p class=\"dim-reveal-text\">${d.pressure}<\u002Fp>\n              <div class=\"dim-reveal-rubric\">\n                ${[1,2,3,4].map(s => `\n                  <div class=\"rubric-cell\">\n                    <div class=\"rc-score\"><span class=\"dot\" style=\"background:${scoreColors[s]};\"><\u002Fspan>${s} · ${rubricWords[s-1]}<\u002Fdiv>\n                  <\u002Fdiv>\n                `).join('')}\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    `;\n    row.addEventListener('click', (e) => {\n      // Don't toggle on link clicks inside (there aren't any, but defensive)\n      row.classList.toggle('open');\n    });\n    dimList.appendChild(row);\n  });\n\n  /* ======================== RADAR (proprietary instrument) ======================== */\n  const radar = document.getElementById('radarSvg');\n  const NS = 'http://www.w3.org/2000/svg';\n  const R_MAX = 210;   // outer ring radius\n  const R_INNER = 48;  // minimum / center plate radius\n  const SHORT = [\n    'Promise-to-Delivery',\n    'Internal Alignment',\n    'Narrative',\n    'Operational Capacity',\n    'Transition Readiness',\n    'Audience Translation',\n    'Market Position',\n    'Architecture',\n    'Cultural Integration',\n    'Adoption Infra.'\n  ];\n\n  function polar(r, a) {\n    return [Math.cos(a) * r, Math.sin(a) * r];\n  }\n\n  function buildRadar() {\n    radar.innerHTML = '';\n    const n = 10;\n    const step = (Math.PI * 2) / n;\n    const start = -Math.PI / 2;\n\n    // Defs: radial gradient for fill\n    const defs = document.createElementNS(NS, 'defs');\n    defs.innerHTML = `\n      <radialGradient id=\"radarFill\" cx=\"0\" cy=\"0\" r=\"${R_MAX}\" gradientUnits=\"userSpaceOnUse\">\n        <stop offset=\"0%\" stop-color=\"#c4683a\" stop-opacity=\"0.35\"/>\n        <stop offset=\"60%\" stop-color=\"#c4683a\" stop-opacity=\"0.18\"/>\n        <stop offset=\"100%\" stop-color=\"#c4683a\" stop-opacity=\"0.08\"/>\n      <\u002FradialGradient>\n      <radialGradient id=\"ringWash\" cx=\"0\" cy=\"0\" r=\"${R_MAX}\" gradientUnits=\"userSpaceOnUse\">\n        <stop offset=\"0%\" stop-color=\"#ece7d8\" stop-opacity=\"0.03\"/>\n        <stop offset=\"100%\" stop-color=\"#ece7d8\" stop-opacity=\"0\"/>\n      <\u002FradialGradient>\n    `;\n    radar.appendChild(defs);\n\n    // Background wash\n    const wash = document.createElementNS(NS, 'circle');\n    wash.setAttribute('cx', 0); wash.setAttribute('cy', 0);\n    wash.setAttribute('r', R_MAX + 8);\n    wash.setAttribute('fill', 'url(#ringWash)');\n    radar.appendChild(wash);\n\n    // Concentric rings (1,2,3,4 score levels)\n    const ringColors = ['#c44040', '#d4854a', '#c9a96e', '#5a8a5a']; // score 1..4\n    for (let k = 1; k <= 4; k++) {\n      const r = (k / 4) * R_MAX;\n      // Ring circle (subtle colored stroke)\n      const circ = document.createElementNS(NS, 'circle');\n      circ.setAttribute('cx', 0); circ.setAttribute('cy', 0);\n      circ.setAttribute('r', r);\n      circ.setAttribute('fill', 'none');\n      circ.setAttribute('stroke', ringColors[k-1]);\n      circ.setAttribute('stroke-opacity', k === 4 ? '0.22' : '0.10');\n      circ.setAttribute('stroke-width', '1');\n      if (k < 4) circ.setAttribute('stroke-dasharray', '2 4');\n      radar.appendChild(circ);\n\n      // Ring label (left side, in the gutter just below the ring)\n      const lbl = document.createElementNS(NS, 'text');\n      lbl.setAttribute('x', -6);\n      lbl.setAttribute('y', -r + 3);\n      lbl.setAttribute('text-anchor', 'end');\n      lbl.setAttribute('font-family', 'Founders Grotesk, Helvetica, Arial, sans-serif');\n      lbl.setAttribute('font-size', '9');\n      lbl.setAttribute('font-weight', '500');\n      lbl.setAttribute('letter-spacing', '0.12em');\n      lbl.setAttribute('fill', ringColors[k-1]);\n      lbl.setAttribute('fill-opacity', '0.55');\n      lbl.textContent = String(k);\n      radar.appendChild(lbl);\n    }\n\n    // Spokes & tick marks\n    for (let i = 0; i < n; i++) {\n      const a = start + i * step;\n      // Spoke line\n      const spoke = document.createElementNS(NS, 'line');\n      const [x1, y1] = polar(R_INNER - 6, a);\n      const [x2, y2] = polar(R_MAX, a);\n      spoke.setAttribute('x1', x1); spoke.setAttribute('y1', y1);\n      spoke.setAttribute('x2', x2); spoke.setAttribute('y2', y2);\n      spoke.setAttribute('stroke', '#ece7d8');\n      spoke.setAttribute('stroke-opacity', '0.08');\n      spoke.setAttribute('stroke-width', '1');\n      radar.appendChild(spoke);\n\n      // Tick marks at 1/2/3/4 score radii\n      for (let k = 1; k <= 4; k++) {\n        const r = (k / 4) * R_MAX;\n        const [tx, ty] = polar(r, a);\n        // Perpendicular tick: rotate spoke angle by 90deg\n        const pa = a + Math.PI / 2;\n        const tLen = k === 4 ? 6 : 3;\n        const [dx, dy] = [Math.cos(pa) * tLen, Math.sin(pa) * tLen];\n        const tick = document.createElementNS(NS, 'line');\n        tick.setAttribute('x1', tx - dx); tick.setAttribute('y1', ty - dy);\n        tick.setAttribute('x2', tx + dx); tick.setAttribute('y2', ty + dy);\n        tick.setAttribute('stroke', '#ece7d8');\n        tick.setAttribute('stroke-opacity', k === 4 ? '0.3' : '0.12');\n        tick.setAttribute('stroke-width', '1');\n        radar.appendChild(tick);\n      }\n\n      // Dimension label\n      const labelR = R_MAX + 32;\n      const [lx, ly] = polar(labelR, a);\n      const numR = R_MAX + 16;\n      const [nx, ny] = polar(numR, a);\n\n      // Small number at label\n      const num = document.createElementNS(NS, 'text');\n      num.setAttribute('x', nx); num.setAttribute('y', ny);\n      num.setAttribute('text-anchor', 'middle');\n      num.setAttribute('dominant-baseline', 'middle');\n      num.setAttribute('font-family', 'Founders Grotesk, Helvetica, Arial, sans-serif');\n      num.setAttribute('font-size', '9');\n      num.setAttribute('font-weight', '500');\n      num.setAttribute('fill', '#6a655b');\n      num.setAttribute('letter-spacing', '0.08em');\n      num.textContent = String(i + 1).padStart(2, '0');\n      radar.appendChild(num);\n\n      // Main dimension label\n      const lbl = document.createElementNS(NS, 'text');\n      lbl.setAttribute('x', lx); lbl.setAttribute('y', ly);\n      lbl.setAttribute('dominant-baseline', 'middle');\n      lbl.setAttribute('font-family', 'Tiempos Headline, Georgia, serif');\n      lbl.setAttribute('font-style', 'normal');\n      lbl.setAttribute('font-weight', '400');\n      lbl.setAttribute('font-size', '13');\n      lbl.setAttribute('letter-spacing', '-0.02em');\n      lbl.setAttribute('fill', '#ece7d8');\n      lbl.setAttribute('fill-opacity', '0.85');\n      // Align based on angle\n      const cosA = Math.cos(a);\n      if (Math.abs(cosA) < 0.15) lbl.setAttribute('text-anchor', 'middle');\n      else if (cosA > 0) lbl.setAttribute('text-anchor', 'start');\n      else lbl.setAttribute('text-anchor', 'end');\n      // Nudge vertical labels (top/bottom) a little away\n      if (Math.abs(cosA) < 0.15) {\n        const y = Math.sin(a) > 0 ? ly + 6 : ly - 6;\n        lbl.setAttribute('y', y);\n      }\n      lbl.textContent = SHORT[i];\n      lbl.setAttribute('data-dim-label', i);\n      radar.appendChild(lbl);\n    }\n\n    // Outer ring accent\n    const outer = document.createElementNS(NS, 'circle');\n    outer.setAttribute('cx', 0); outer.setAttribute('cy', 0);\n    outer.setAttribute('r', R_MAX);\n    outer.setAttribute('fill', 'none');\n    outer.setAttribute('stroke', '#ece7d8');\n    outer.setAttribute('stroke-opacity', '0.2');\n    outer.setAttribute('stroke-width', '1');\n    radar.appendChild(outer);\n\n    // Center plate\n    const plate = document.createElementNS(NS, 'circle');\n    plate.setAttribute('cx', 0); plate.setAttribute('cy', 0);\n    plate.setAttribute('r', R_INNER);\n    plate.setAttribute('fill', '#0c0c0a');\n    plate.setAttribute('stroke', '#c4683a');\n    plate.setAttribute('stroke-opacity', '0.4');\n    plate.setAttribute('stroke-width', '1');\n    radar.appendChild(plate);\n\n    // Crosshairs inside center plate\n    const ch1 = document.createElementNS(NS, 'line');\n    ch1.setAttribute('x1', -R_INNER + 4); ch1.setAttribute('y1', 0);\n    ch1.setAttribute('x2', R_INNER - 4); ch1.setAttribute('y2', 0);\n    ch1.setAttribute('stroke', '#c4683a'); ch1.setAttribute('stroke-opacity', '0.35');\n    ch1.setAttribute('stroke-width', '1');\n    radar.appendChild(ch1);\n    const ch2 = document.createElementNS(NS, 'line');\n    ch2.setAttribute('x1', 0); ch2.setAttribute('y1', -R_INNER + 4);\n    ch2.setAttribute('x2', 0); ch2.setAttribute('y2', R_INNER - 4);\n    ch2.setAttribute('stroke', '#c4683a'); ch2.setAttribute('stroke-opacity', '0.35');\n    ch2.setAttribute('stroke-width', '1');\n    radar.appendChild(ch2);\n\n    // BPI stamp\n    const stampTop = document.createElementNS(NS, 'text');\n    stampTop.setAttribute('x', 0); stampTop.setAttribute('y', -12);\n    stampTop.setAttribute('text-anchor', 'middle');\n    stampTop.setAttribute('font-family', 'Tiempos Headline, Georgia, serif');\n    stampTop.setAttribute('font-weight', '300');\n    stampTop.setAttribute('font-size', '22');\n    stampTop.setAttribute('letter-spacing', '-0.02em');\n    stampTop.setAttribute('fill', '#ece7d8');\n    stampTop.textContent = 'BPI';\n    radar.appendChild(stampTop);\n\n    const stampSub = document.createElementNS(NS, 'text');\n    stampSub.setAttribute('x', 0); stampSub.setAttribute('y', 8);\n    stampSub.setAttribute('text-anchor', 'middle');\n    stampSub.setAttribute('font-family', 'Founders Grotesk, Helvetica, Arial, sans-serif');\n    stampSub.setAttribute('font-weight', '500');\n    stampSub.setAttribute('font-size', '7.5');\n    stampSub.setAttribute('letter-spacing', '0.2em');\n    stampSub.setAttribute('fill', '#c4683a');\n    stampSub.textContent = 'BACKROOM';\n    radar.appendChild(stampSub);\n\n    const stampBot = document.createElementNS(NS, 'text');\n    stampBot.setAttribute('x', 0); stampBot.setAttribute('y', 22);\n    stampBot.setAttribute('text-anchor', 'middle');\n    stampBot.setAttribute('font-family', 'Founders Grotesk, Helvetica, Arial, sans-serif');\n    stampBot.setAttribute('font-weight', '400');\n    stampBot.setAttribute('font-size', '6.5');\n    stampBot.setAttribute('letter-spacing', '0.22em');\n    stampBot.setAttribute('fill', '#6a655b');\n    stampBot.textContent = 'BRAND PRESSURE INDEX';\n    radar.appendChild(stampBot);\n\n    // Polygon placeholder (will be populated by drawScores)\n    const poly = document.createElementNS(NS, 'polygon');\n    poly.setAttribute('id', 'scorePoly');\n    poly.setAttribute('fill', 'url(#radarFill)');\n    poly.setAttribute('stroke', '#c4683a');\n    poly.setAttribute('stroke-width', '1.25');\n    poly.setAttribute('stroke-linejoin', 'round');\n    poly.setAttribute('stroke-opacity', '0.85');\n    poly.setAttribute('points', '0,0');\n    poly.style.transition = 'all 0.55s cubic-bezier(.2,.7,.2,1)';\n    radar.appendChild(poly);\n\n    // Dots group\n    const dots = document.createElementNS(NS, 'g');\n    dots.setAttribute('id', 'scoreDots');\n    radar.appendChild(dots);\n\n    // Weight highlights group (behind labels, shows heavy dimensions)\n    const wg = document.createElementNS(NS, 'g');\n    wg.setAttribute('id', 'weightGroup');\n    radar.appendChild(wg);\n  }\n\n  function drawScores(scores, weighted) {\n    const n = 10;\n    const step = (Math.PI * 2) / n;\n    const start = -Math.PI / 2;\n\n    // Polygon points\n    const pts = [];\n    for (let i = 0; i < n; i++) {\n      const a = start + i * step;\n      const r = Math.max(R_INNER + 2, (scores[i] / 4) * R_MAX);\n      const [x, y] = polar(r, a);\n      pts.push(`${x.toFixed(1)},${y.toFixed(1)}`);\n    }\n    const poly = document.getElementById('scorePoly');\n    poly.setAttribute('points', pts.join(' '));\n\n    // Dots\n    const dots = document.getElementById('scoreDots');\n    dots.innerHTML = '';\n    for (let i = 0; i < n; i++) {\n      const a = start + i * step;\n      const r = Math.max(R_INNER + 2, (scores[i] / 4) * R_MAX);\n      const [x, y] = polar(r, a);\n\n      // Outer ring (halo) so dot pops off polygon\n      const halo = document.createElementNS(NS, 'circle');\n      halo.setAttribute('cx', x); halo.setAttribute('cy', y);\n      halo.setAttribute('r', 8);\n      halo.setAttribute('fill', '#0c0c0a');\n      halo.setAttribute('stroke', scoreColors[scores[i]]);\n      halo.setAttribute('stroke-width', '1');\n      halo.setAttribute('stroke-opacity', '0.4');\n      halo.style.transition = 'all 0.55s cubic-bezier(.2,.7,.2,1)';\n      dots.appendChild(halo);\n\n      const c = document.createElementNS(NS, 'circle');\n      c.setAttribute('cx', x); c.setAttribute('cy', y);\n      c.setAttribute('r', 4);\n      c.setAttribute('fill', scoreColors[scores[i]]);\n      c.setAttribute('stroke', '#0c0c0a');\n      c.setAttribute('stroke-width', '1.5');\n      c.style.transition = 'all 0.55s cubic-bezier(.2,.7,.2,1)';\n      dots.appendChild(c);\n    }\n\n    // Weight highlights: subtle wedge behind weighted dimension labels\n    const wg = document.getElementById('weightGroup');\n    wg.innerHTML = '';\n    weighted.forEach(idx => {\n      const a = start + idx * step;\n      // Wedge from inner edge of radar to outer, ±half-step thin\n      const half = step * 0.32;\n      const a1 = a - half, a2 = a + half;\n      const [p1x, p1y] = polar(R_MAX + 4, a1);\n      const [p2x, p2y] = polar(R_MAX + 4, a2);\n      const [p3x, p3y] = polar(R_MAX + 24, a2);\n      const [p4x, p4y] = polar(R_MAX + 24, a1);\n      const wedge = document.createElementNS(NS, 'path');\n      const large = 0;\n      wedge.setAttribute('d',\n        `M ${p1x.toFixed(1)} ${p1y.toFixed(1)} ` +\n        `A ${R_MAX + 4} ${R_MAX + 4} 0 ${large} 1 ${p2x.toFixed(1)} ${p2y.toFixed(1)} ` +\n        `L ${p3x.toFixed(1)} ${p3y.toFixed(1)} ` +\n        `A ${R_MAX + 24} ${R_MAX + 24} 0 ${large} 0 ${p4x.toFixed(1)} ${p4y.toFixed(1)} Z`\n      );\n      wedge.setAttribute('fill', '#c4683a');\n      wedge.setAttribute('fill-opacity', '0.22');\n      wg.appendChild(wedge);\n    });\n\n    // Brighten weighted labels\n    document.querySelectorAll('[data-dim-label]').forEach(el => {\n      const i = Number(el.getAttribute('data-dim-label'));\n      if (weighted.includes(i)) {\n        el.setAttribute('fill', '#c4683a');\n        el.setAttribute('fill-opacity', '1');\n      } else {\n        el.setAttribute('fill', '#ece7d8');\n        el.setAttribute('fill-opacity', '0.78');\n      }\n    });\n  }\n\n  /* ======================== MOMENT RENDER ======================== */\n  function renderMoment(key) {\n    const m = moments[key];\n    const nameEl = document.getElementById('momentName');\n    nameEl.innerHTML = m.name;\n    document.getElementById('momentBlurb').textContent = m.blurb;\n\n    // Weighted items (ordered)\n    const wrap = document.getElementById('weightedItems');\n    wrap.innerHTML = '';\n    m.weighted.forEach(idx => {\n      const item = document.createElement('div');\n      item.className = 'wi';\n      item.innerHTML = `\n        <span class=\"wi-num\">${String(idx+1).padStart(2,'0')}<\u002Fspan>\n        <span class=\"wi-name\">${dimensions[idx].n.replace('&', '&amp;')}<\u002Fspan>\n        <span class=\"wi-w\">1.5×<\u002Fspan>\n      `;\n      wrap.appendChild(item);\n    });\n\n    // Weight highlight on dim list\n    document.querySelectorAll('.dim-row').forEach((row, i) => {\n      row.classList.toggle('weighted', m.weighted.includes(i));\n    });\n\n    // Score + band\n    const total = m.scores.reduce((a, b) => a + b, 0);\n    document.getElementById('scoreNum').textContent = total;\n    const band = bandFor(total);\n    const bandEl = document.getElementById('bandName');\n    bandEl.textContent = band.name;\n    bandEl.style.color = band.color;\n\n    // Score marker on radar footer scale\n    const pct = (total / 40) * 100;\n    document.getElementById('scoreMarker').style.left = pct + '%';\n\n    // Spectrum cursor\n    document.getElementById('spectrumCursor').style.left = pct + '%';\n    document.getElementById('spectrumTag').textContent = 'Sample · ' + total;\n\n    // Radar\n    drawScores(m.scores, m.weighted);\n\n    // Active state\n    document.querySelectorAll('.moment').forEach(btn => {\n      btn.classList.toggle('active', btn.dataset.moment === key);\n    });\n  }\n\n  // Wire tags\n  document.querySelectorAll('.moment').forEach(btn => {\n    btn.addEventListener('click', () => renderMoment(btn.dataset.moment));\n  });\n\n  // Build radar scaffolding & initial render\n  buildRadar();\n  renderMoment('leadership');\n\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
